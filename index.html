    function stageSummary(stage){
      if(stage === STAGES.LANDBANK){
        return `
          <div class="small"><b>Objetivo:</b> ¿Qué oportunidades existen, aunque todavía no hemos decidido invertir tiempo en analizarlas?</div>
          <div class="divider"></div>
          <div class="muted small">Terrenos o ideas aún NO decididas para análisis.</div>
          <ul style="margin:8px 0 0 0; padding-left:18px">
            <li>Registro de terreno / oportunidad (ficha básica)</li>
            <li>Ubicación y datos básicos (sin análisis formal)</li>
            <li>Priorización: ¿pasar a Perfil para análisis?</li>
          </ul>
        `;
      }
      if(stage === STAGES.PERFIL){
        return `
          <div class="small"><b>Objetivo:</b> ¿Vale la pena invertir tiempo y recursos en analizar este proyecto?</div>
          <div class="divider"></div>
          <ul style="margin:0; padding-left:18px">
            <li>Registro de propuesta (ficha, ubicación, tipo, origen)</li>
            <li>Screening: FODA preliminar + mercado light + recomendación</li>
            <li>Modelo financiero preliminar (orden de magnitud)</li>
            <li>Memorándum de Perfil</li>
            <li>Comité — Perfil</li>
          </ul>
        `;
      }
      if(stage === STAGES.PREFACT){
        return `
          <div class="small"><b>Objetivo:</b> ¿Este proyecto es estructurable y negociable?</div>
          <div class="divider"></div>
          <ul style="margin:0; padding-left:18px">
            <li>LOI + exclusividad tentativa</li>
            <li>Opiniones técnicas (IO) + legal preliminar</li>
            <li>Mercado interno más profundo</li>
            <li>Catálogo y presupuesto preliminar</li>
            <li>Modelo financiero de prefactibilidad + memorándum</li>
            <li>Comité — Prefactibilidad</li>
          </ul>
        `;
      }
      if(stage === STAGES.FACT){
        return `
          <div class="small"><b>Objetivo:</b> ¿Es técnica, legal y financieramente invertible?</div>
          <div class="divider"></div>
          <ul style="margin:0; padding-left:18px">
            <li>Trámites formales (uso de suelo, agua, etc.)</li>
            <li>Estudios técnicos (topo, suelos, ambiental)</li>
            <li>Legal (título, gravámenes) + mercado formal (tercero)</li>
            <li>Reporte técnico integral</li>
            <li>Modelo Base (pipeline final) + memorándum</li>
            <li>Comité — Autorización</li>
          </ul>
        `;
      }
      return `
        <div class="small"><b>Objetivo:</b> Ejecución por etapas (Phase Plan) con control y reforecast.</div>
        <div class="divider"></div>
        <ul style="margin:0; padding-left:18px">
          <li>Master Plan definitivo</li>
          <li>Phase Plan etapa 1 (presupuesto, cronograma, MF etapa)</li>
          <li>Control (Planeado vs Real) + reforecast</li>
          <li>Lecciones aprendidas</li>
          <li>Phase Plan etapas siguientes</li>
        </ul>
      `;
    }

    function modelExpected(stage){
      if(stage === STAGES.LANDBANK) return MODELS.LANDBANK;
      if(stage === STAGES.PERFIL) return MODELS.PERFIL;
      if(stage === STAGES.PREFACT) return MODELS.PREFACT;
      if(stage === STAGES.FACT) return MODELS.FACT;
      return MODELS.PORT;
    }

    function renderChecklist(p){
      if(!p.checklist || p.checklist.length===0){
        return `<div class="muted">No hay checklist para esta etapa.</div>`;
      }
      return `
        <div style="display:flex; flex-direction:column; gap:8px">
          ${p.checklist.map((c, idx)=>{
            const risk = !c.done ? getRiskForChecklistItem(p.stage, c.key) : null;
            return `
            <label class="pill" style="width:100%; cursor:pointer; justify-content:space-between; align-items:center;">
              <span style="display:flex; gap:10px; align-items:flex-start;">
                <input type="checkbox" ${c.done ? "checked":""} onchange="toggleChecklist('${p.id}', ${idx}, this.checked)" />
                <span>
                  <span>${escapeHtml(c.label)}</span>
                  ${risk ? `<div class="muted small" style="margin-top:4px;" title="${escapeHtml(risk.consequence)}">${escapeHtml(risk.impact)} — ${escapeHtml(risk.consequence)}</div>` : ""}
                </span>
              </span>
              <span style="display:flex; align-items:center; gap:8px;">
                <input type="file" style="position:absolute; opacity:0; width:0; height:0;" id="cl-f-${p.id}-${idx}" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg" onchange="setChecklistFile('${p.id}', ${idx}, this)" />
                <label for="cl-f-${p.id}-${idx}" class="btn btn-outline" style="padding:5px 10px; font-size:var(--fs-12); cursor:pointer; margin:0; white-space:nowrap;" title="Cargar archivo">Cargar archivo</label>
                ${c.file ? `<span class="muted small" style="max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(c.file)}">${escapeHtml(c.file)}</span>` : ""}
              </span>
            </label>
          `}).join("")}
        </div>
      `;
    }

    function checklistProgress(p){
      if(!p.checklist || p.checklist.length===0) return 0;
      const done = p.checklist.filter(x=>x.done).length;
      return Math.round((done / p.checklist.length) * 100);
    }

    function renderModelRow(p, key, stageLabel){
      const item = p.models[key];
      const status = item?.status ?? "N/A";

      return `
        <tr>
          <td>${escapeHtml(stageLabel)}</td>
          <td><b>${escapeHtml(item?.name ?? "N/A")}</b></td>
          <td>${escapeHtml(status)}</td>
          <td>
            <div class="t-actions">
              <button class="btn btn-outline" onclick="cycleModelStatus('${p.id}','${key}')">Cambiar estado</button>
              <button class="btn btn-ghost" onclick="toast('Mock', 'Aquí iría la vista del modelo / inputs / versión.')">Abrir</button>
            </div>
          </td>
        </tr>
      `;
    }

    /* =========================
       Actions
       ========================= */
    window.saveNotes = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      const notes = document.getElementById("notes");
      if(!p || !notes) return;
      p.notes = notes.value;
      touch(p, "Notas guardadas");
      toast("Guardado", "Notas ejecutivas actualizadas.");
    };

    window.toggleChecklist = function(projectId, idx, checked){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;
      p.checklist[idx].done = checked;
      touch(p, `Checklist: ${p.checklist[idx].label}`, checked ? "Marcado como listo" : "Marcado como pendiente");
    };

    window.setChecklistFile = function(projectId, idx, inputEl){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p || !inputEl || !inputEl.files || !inputEl.files[0]) return;
      const file = inputEl.files[0];
      p.checklist[idx].file = file.name;
      touch(p, "Archivo adjunto", `${p.checklist[idx].label}: ${file.name}`);
      renderProjectDetail();
      toast("Archivo", "Nombre guardado (prototipo: no se sube el archivo).");
    };

    window.resetChecklist = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;
      p.checklist = structuredClone(checklistTemplates[p.stage] || []);
      touch(p, "Checklist reiniciado");
      renderProjectDetail();
      toast("OK", "Checklist reiniciado.");
    };

    window.openGateModal = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;

      if(p.stage === STAGES.PORT){
        toast("N/A", "En Portafolio no aplica Gate de Pipeline.");
        return;
      }

      const openRisksGate = getOpenRisks(p).filter(x => x.risk.impact !== "Bajo");
      const risksBlockHtml = openRisksGate.length ? `
          <div class="divider"></div>
          <div class="field">
            <div class="label">Riesgos por incumplimiento de proceso</div>
            <div class="muted small">Entregables no cumplidos con impacto Medio, Alto o Muy Alto.</div>
            <div style="margin-top:8px; padding:10px; background:var(--color-bg-soft); border-radius:var(--radius-md); border:1px solid var(--color-border);">
              ${openRisksGate.map(({ item, risk }) => `
                <div style="margin-bottom:8px;">
                  <span>${escapeHtml(risk.impact)}</span>
                  <strong style="font-size:var(--fs-12);">${escapeHtml(item.label)}</strong>
                  <div class="muted small" style="margin-left:24px; margin-top:2px;">${escapeHtml(risk.consequence)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        ` : "";

      openModal(
        "Actualizar Gate",
        `
          <div class="grid-2">
            <div class="field">
              <div class="label">Proyecto</div>
              <div><b>${escapeHtml(p.code)} — ${escapeHtml(p.name)}</b></div>
              <div class="muted small">${escapeHtml(p.gate)}</div>
            </div>

            <div class="field">
              <label class="label req">Estado Gate</label>
              <select class="select" id="gateStatus">
                <option value="${GATE_STATUS.PENDING}" ${p.gateStatus===GATE_STATUS.PENDING?"selected":""}>${GATE_STATUS.PENDING}</option>
                <option value="${GATE_STATUS.CONDITIONAL}" ${p.gateStatus===GATE_STATUS.CONDITIONAL?"selected":""}>${GATE_STATUS.CONDITIONAL}</option>
                <option value="${GATE_STATUS.APPROVED}" ${p.gateStatus===GATE_STATUS.APPROVED?"selected":""}>${GATE_STATUS.APPROVED}</option>
                <option value="${GATE_STATUS.REJECTED}" ${p.gateStatus===GATE_STATUS.REJECTED?"selected":""}>${GATE_STATUS.REJECTED}</option>
              </select>
              <div class="muted small">Tip demo: "condicionado" para simular faltantes; "no aprobado" va a No Go.</div>
            </div>
          </div>
          ${risksBlockHtml}
          <div class="divider"></div>

          <div class="field">
            <label class="label">Comentario (opcional)</label>
            <textarea class="textarea" id="gateComment" placeholder="Ej. Falta validar agua, densidad o estimación CapEx.">${escapeHtml("")}</textarea>
          </div>
        `,
        `
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="applyGate('${p.id}')">Guardar</button>
        `
      );
    };

    window.applyGate = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;
      const status = document.getElementById("gateStatus").value;
      const comment = document.getElementById("gateComment").value.trim();

      p.gateStatus = status;
      touch(p, "Gate actualizado", status + (comment ? ` — ${comment}` : ""));
      closeModal();

      // If in project detail, re-render detail; otherwise refresh current view.
      if(state.selectedProjectId === projectId) renderProjectDetail();
      else render();
      toast("Actualizado", `Gate: ${status}`);
    };

    window.openStageModal = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;

      const blocking = getOpenRisksByRule(p, "Bloqueante");
      const conditional = getOpenRisksByRule(p, "Condicionable");
      const conditionalBlockHtml = conditional.length > 0 ? `
          <div class="divider"></div>
          <div class="field" style="grid-column:1/-1;">
            <div class="label">Riesgos condicionables — avance como &quot;Aprobado condicionado&quot;</div>
            <div class="muted small">Debe completar los siguientes campos para avanzar con entregables pendientes de impacto Alto/Medio.</div>
            <div class="grid-2" style="margin-top:8px;">
              <div class="field">
                <label class="label req">Justificación</label>
                <input type="text" class="input" id="riskJustification" placeholder="Motivo para avanzar con riesgos abiertos" />
              </div>
              <div class="field">
                <label class="label req">Responsable que asume el riesgo</label>
                <input type="text" class="input" id="riskResponsible" placeholder="Nombre o rol" />
              </div>
              <div class="field" style="grid-column:1/-1;">
                <label class="label req">Comentario</label>
                <textarea class="textarea" id="riskComment" placeholder="Compromisos o condiciones de avance"></textarea>
              </div>
            </div>
          </div>
        ` : "";

      openModal(
        "Mover etapa",
        `
          <div class="grid-2">
            <div class="field">
              <div class="label">Proyecto</div>
              <div><b>${escapeHtml(p.code)} — ${escapeHtml(p.name)}</b></div>
              <div class="muted small">Etapa actual: <b>${escapeHtml(p.stage)}</b></div>
            </div>
            <div class="field">
              <label class="label req">Nueva etapa</label>
              <select class="select" id="newStage">
                ${Object.values(STAGES).map(s=>`
                  <option value="${escapeHtml(s)}" ${s===p.stage?"selected":""}>${escapeHtml(s)}</option>
                `).join("")}
              </select>
              <div class="muted small">Al cambiar etapa se reinicia checklist con el template correspondiente.</div>
            </div>
          </div>
          ${conditionalBlockHtml}
        `,
        `
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="applyStage('${p.id}')">Mover</button>
        `
      );
    };

    window.applyStage = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;
      const newStageEl = document.getElementById("newStage");
      if(!newStageEl) return;
      const newStage = newStageEl.value;

      if(newStage === p.stage){
        closeModal();
        return;
      }

      const blocking = getOpenRisksByRule(p, "Bloqueante");
      const conditional = getOpenRisksByRule(p, "Condicionable");

      if(blocking.length > 0){
        const list = blocking.map(({ item }) => item.label).join("; ");
        toast("No es posible avanzar", "Sin atender los siguientes riesgos críticos: " + list);
        return;
      }

      if(conditional.length > 0){
        const justification = (document.getElementById("riskJustification") && document.getElementById("riskJustification").value.trim()) || "";
        const responsible = (document.getElementById("riskResponsible") && document.getElementById("riskResponsible").value.trim()) || "";
        const comment = (document.getElementById("riskComment") && document.getElementById("riskComment").value.trim()) || "";
        if(!justification || !responsible || !comment){
          toast("Campos requeridos", "Debe completar Justificación, Responsable y Comentario para avanzar en modo Aprobado condicionado.");
          return;
        }
        p.gateStatus = GATE_STATUS.CONDITIONAL;
        if(!p.conditionalAdvance) p.conditionalAdvance = {};
        p.conditionalAdvance.lastAdvance = { justification, responsible, comment, at: new Date().toISOString() };
        touch(p, "Avance condicionado", `Responsable: ${responsible}. ${comment}`);
      }

      // Business rule (demo): only allow moving forward unless stakeholder wants free navigation
      // We'll allow any move, but we update gate accordingly.
      p.stage = newStage;
      p.gate = gateForStage(newStage);
      p.gateStatus = gateStatusDefault(newStage);
      p.checklist = structuredClone(checklistTemplates[newStage] || []);
      touch(p, "Etapa actualizada", `Nueva etapa: ${newStage}`);

      // Adjust model statuses
      p.models.landbank = p.models.landbank || { name: MODELS.LANDBANK, status: "No aplica" };
      p.models.landbank.status = (newStage === STAGES.LANDBANK) ? "En progreso" : "No aplica";
      p.models.perfil.status = (newStage === STAGES.PERFIL) ? "En progreso" : (newStage === STAGES.LANDBANK ? "Pendiente" : "Completado");
      p.models.prefact.status = (newStage === STAGES.PREFACT) ? "En progreso" : (newStage === STAGES.PERFIL || newStage === STAGES.LANDBANK ? "Pendiente" : "Completado");
      p.models.fact.status = (newStage === STAGES.FACT) ? "En progreso" : (newStage === STAGES.PORT ? "Completado" : "Pendiente");
      p.models.port.status = (newStage === STAGES.PORT) ? "Activo" : "No aplica";

      closeModal();
      renderProjectDetail();
      toast("Etapa movida", `Ahora: ${newStage}`);
    };

    window.simulatePortfolioTransition = function(projectId){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;

      // Demo rule: typically Factibilidad approved -> Portafolio
      if(p.stage !== STAGES.FACT || p.gateStatus !== GATE_STATUS.APPROVED){
        toast("Regla demo", "Para transición: estar en Factibilidad y Gate Aprobado.");
        return;
      }
      p.stage = STAGES.PORT;
      p.gate = "N/A (Ejecución por etapas)";
      p.gateStatus = "N/A";
      p.checklist = structuredClone(checklistTemplates[STAGES.PORT] || []);

      touch(p, "Transición a Portafolio", "Pipeline congelado, Base Case se vuelve Línea Base Autorizada, centro de costo asignado (simulado).");

      toast("Portafolio", "Transición simulada completada.");
    };

    window.cycleModelStatus = function(projectId, key){
      const p = db.projects.find(x=>x.id===projectId);
      if(!p) return;
      const item = p.models[key];
      if(!item) return;

      const seq = ["Pendiente","En progreso","Completado"];
      if(item.status === "Activo" || item.status === "No aplica"){
        toast("N/A", "Este modelo no aplica para ciclo estándar.");
        return;
      }
      const i = seq.indexOf(item.status);
      item.status = seq[(i+1) % seq.length];
      touch(p, "Modelo actualizado", `${item.name}: ${item.status}`);
      renderProjectDetail();
      toast("Actualizado", "Estado del modelo cambiado.");
    };

      if(db.activity.length > 50) db.activity.shift();
    }

    window.initMFControl = function(root, currentProjectId){
      if(!root) return;
      const PROJECTS = buildMFProjectsFromDb();
      const MF_STAGES = ["Screening","Prefactibilidad","Factibilidad / IC","Conceptual","SD","DD","CD","Licitación","Construcción","Cierre"];
      const $ = (sel) => root.querySelector(sel);
      const $$ = (sel) => root.querySelectorAll(sel);

      const mfState = { projectId: currentProjectId || (PROJECTS[0] && PROJECTS[0].id), stage: "All", versionId: null, tab: "dashboard", inputs: {} };
      const proj = PROJECTS.find(p => p.id === mfState.projectId) || PROJECTS[0];
      if(proj) mfState.versionId = proj.versions.find(v => v.vigente)?.id || proj.versions[proj.versions.length-1]?.id;

      function showToast(msg){ const t = $("#mfToast"); if(t){ t.textContent = msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 1600); } else if(typeof toast === "function") toast("MF", msg); }
      function fmtPct(x){ if(x==null||Number.isNaN(x)) return "—"; return (x*100).toFixed(2)+"%"; }
      function fmtBps(bps){ if(bps==null||Number.isNaN(bps)) return "—"; return (bps>0?"+":"")+Math.round(bps)+" bps"; }
      function fmtMoney(n, c="MXN"){ if(n==null||Number.isNaN(n)) return "—"; return new Intl.NumberFormat("es-MX",{style:"currency",currency:c,maximumFractionDigits:0}).format(n); }
      function fmtThreshold(th){ if(!th) return "—"; if(th.type==="pct") return th.value.toFixed(1)+"%"; if(th.type==="bps") return th.value+" bps"; if(th.type==="months") return th.value+" meses"; return String(th.value); }
      function fmtValue(val){ if(!val) return "—"; if(val.type==="pct") return val.value.toFixed(1)+"%"; if(val.type==="bps") return val.value+" bps"; if(val.type==="months") return val.value+" meses"; return String(val.value); }
      function stateCls(s){ if(s==="OK") return "ok"; if(s==="WARN") return "warn"; return "bad"; }
      function getProject(){ return PROJECTS.find(p => p.id === mfState.projectId); }
      function getVersion(project){ const p = project || getProject(); return p && (p.versions.find(v => v.id === mfState.versionId) || p.versions[p.versions.length-1]); }
      function getUW(project){ const p = project || getProject(); return p && (p.versions.find(v => v.id === p.uwVersionId) || p.versions[0]); }

      function activateTab(name){
        mfState.tab = name;
        $$(".mf-tab").forEach(t => t.classList.toggle("is-active", t.dataset.tab === name));
        $$(".mf-panel").forEach(el => el.classList.toggle("is-active", el.id === "tab-"+name));
        renderAll();
      }

      function refreshVersionSelector(){
        const p = getProject(); if(!p) return;
        const el = $("#mfVersion"); if(!el) return;
        el.innerHTML = p.versions.map(v => `<option value="${v.id}">${v.id}${v.vigente?" · vigente":""} (${v.type} · ${v.asOf})</option>`).join("");
        el.value = mfState.versionId || p.versions.find(v=>v.vigente)?.id || p.versions[p.versions.length-1]?.id;
      }

      function renderDashboard(){
        const p = getProject(); const v = getVersion(p); const uw = getUW(p);
        if(!p||!v) return;
        const gs = p.triggers.filter(t=>t.state==="BREACH").length ? { label:"Rojo", cls:"bad" } : p.triggers.filter(t=>t.state==="WARN").length ? { label:"Amarillo", cls:"warn" } : { label:"Verde", cls:"ok" };
        const elGs = $("#mfGlobalStatus"); if(elGs){ elGs.className = "mf-badge "+gs.cls; elGs.textContent = gs.label; }
        const kpis = [
          { label:"TIR", value: fmtPct(v.irr), delta: fmtBps((v.irr-uw.irr)*10000) },
          { label:"Δ bps vs UW", value: fmtBps(v.bps_vs_uw), delta: " " },
          { label:"Margen", value: fmtPct(v.margin), delta: fmtBps((v.margin-uw.margin)*10000) },
          { label:"POC", value: fmtMoney(v.poc,p.currency), delta: fmtMoney(v.poc-uw.poc,p.currency) }
        ];
        const elKpis = $("#mfKpis"); if(elKpis) elKpis.innerHTML = kpis.map(k => `<div class="mf-kpi"><div class="mf-kpi__label">${k.label}</div><div class="mf-kpi__value">${k.value}</div><div class="mf-kpi__delta ${k.delta.includes("+")?"pos":k.delta.includes("-")?"neg":"neu"}">${k.delta===" "?"&nbsp;":k.delta}</div></div>`).join("");
        const elAsOf = $("#mfAsOfDate"); if(elAsOf) elAsOf.textContent = v.asOf;
        const active = p.triggers.filter(t=>t.state==="WARN"||t.state==="BREACH").slice(0,6);
        const elAc = $("#mfActiveTriggerCount"); if(elAc) elAc.textContent = active.length;
        const elAt = $("#mfActiveTriggers"); if(elAt) elAt.innerHTML = active.length ? active.map(t=>`<div class="mf-item"><div class="mf-item__left"><div class="mf-item__title">${t.variable}</div><div class="mf-item__sub">${t.stage} · ${fmtThreshold(t.threshold)}</div></div><div class="mf-item__right"><span class="mf-state ${stateCls(t.state)}">${t.state}</span></div></div>`).join("") : "<div class=\"mf-muted\">Sin triggers activos.</div>";
        const versions = p.versions.slice().sort((a,b)=>a.asOf.localeCompare(b.asOf));
        const elVc = $("#mfVersionCount"); if(elVc) elVc.textContent = versions.length;
        const elTl = $("#mfTimeline"); if(elTl){ elTl.innerHTML = versions.map(ver=>`<div class="mf-node ${ver.id===v.id?"is-selected":""}" data-version="${ver.id}"><div class="mf-node__top"><div class="mf-node__id">${ver.id}</div><div class="mf-node__type">${ver.type}${ver.vigente?" · vigente":""}</div></div><div class="mf-node__meta">${ver.stage} · ${ver.asOf}</div><div class="mf-node__kpi">TIR: ${fmtPct(ver.irr)} · ${fmtBps(ver.bps_vs_uw)}</div></div>`).join("");
          $$(".mf-node", elTl).forEach(node=>{ node.addEventListener("click", ()=>{ mfState.versionId = node.getAttribute("data-version"); $("#mfVersion").value = mfState.versionId; renderAll(); }); });
        }
        const moves = (v.movements||[]).filter(m=>m.category!=="Base"); let cum=0;
        const elMm = $("#mfMiniMoves tbody"); if(elMm) elMm.innerHTML = moves.map(m=>{ cum+=m.bps; return `<tr><td>${m.name}</td><td class="mf-right">${fmtBps(m.bps)}</td><td class="mf-right">${fmtBps(cum)}</td><td class="wrap">${m.comment||""}</td></tr>`; }).join("");
        const elMc = $("#mfMoveCount"); if(elMc) elMc.textContent = moves.length;
        const vig = p.versions.find(x=>x.vigente);
        const elVp = $("#mfVigentePill"); if(elVp) elVp.textContent = vig ? vig.id+" · vigente" : "Sin vigente";
        const snap = [
          ["Versión", v.id+" ("+v.type+")"], ["Estatus",v.status], ["Etapa",v.stage], ["Fecha",v.asOf],
          ["TIR",fmtPct(v.irr)], ["Delta bps vs UW",fmtBps(v.bps_vs_uw)], ["Margen",fmtPct(v.margin)], ["POC",fmtMoney(v.poc,p.currency)]
        ];
        const elSn = $("#mfSnapshot"); if(elSn) elSn.innerHTML = snap.map(function(pair){ return "<div class=\"mf-snap\"><div class=\"mf-snap__k\">"+pair[0]+"</div><div class=\"mf-snap__v\">"+pair[1]+"</div></div>"; }).join("");
      }

      function renderTriggers(){

        const st = ($("#mfTriggerState")&&$("#mfTriggerState").value)||"ALL";
        const rows = p.triggers.filter(t=>(st==="ALL"||t.state===st)&&(!q||t.variable.toLowerCase().includes(q)||t.category.toLowerCase().includes(q)));
        const el = $("#mfTriggerTable tbody"); if(!el) return;
        el.innerHTML = rows.map(t=>`<tr><td><span class="mf-tag">${t.category}</span></td><td class="wrap">${t.variable}</td><td>${t.stage}</td><td class="mf-right">${fmtThreshold(t.threshold)}</td><td class="mf-right">${fmtValue(t.current)}</td><td><span class="mf-state ${stateCls(t.state)}">${t.state}</span></td><td>${t.fires}</td><td><button class="mf-btn mf-btn--ghost">Editar</button></td></tr>`).join("");
      }

      function renderMoves(){
        const p = getProject(); const v = getVersion(p); if(!p||!v) return;
        const moves = (v.movements||[]).filter(m=>m.category!=="Base"); let cum=0;
        const el = $("#mfMovesTable tbody"); if(!el) return;
        el.innerHTML = moves.map(m=>{ cum+=m.bps; return `<tr><td>${m.date}</td><td class="wrap">${m.name}</td><td>${m.category}</td><td class="mf-right">${fmtBps(m.bps)}</td><td class="mf-right">${fmtBps(cum)}</td><td class="wrap">${m.comment||""}</td><td></td></tr>`; }).join("");
      }

      function renderVersions(){
        const p = getProject(); const uw = getUW(p); if(!p) return;
        const sorted = p.versions.slice().sort((a,b)=>a.asOf.localeCompare(b.asOf));
        const el = $("#mfVersionsTable tbody"); if(!el) return;
        el.innerHTML = sorted.map(v=>{ const dUW = Math.round((v.irr-uw.irr)*10000); const tag = v.vigente ? "<span class=\"mf-state ok\">VIGENTE</span>" : "<span class=\"mf-state "+stateCls("OK")+"\">"+v.status+"</span>"; return `<tr><td><strong>${v.id}</strong></td><td>${v.type}</td><td>${v.stage}</td><td>${v.asOf}</td><td class="mf-right">${fmtPct(v.irr)}</td><td class="mf-right">—</td><td class="mf-right">${fmtBps(dUW)}</td><td class="mf-right">${fmtMoney(v.poc,p.currency)}</td><td class="mf-right">${fmtPct(v.margin)}</td><td>${tag}</td><td class="wrap">${v.comments||""}</td><td><button class="mf-btn mf-btn--ghost" data-pick="${v.id}">Seleccionar</button></td></tr>`; }).join("");
        $$("button[data-pick]", el).forEach(btn=>{ btn.addEventListener("click", ()=>{ mfState.versionId = btn.getAttribute("data-pick"); $("#mfVersion").value = mfState.versionId; showToast("Versión seleccionada."); renderAll(); }); });

      function renderPlan12m(){
        const p = getProject(); const v = getVersion(p); if(!p||!v) return;
        const el = $("#mfPlan12m"); if(!el) return;
        const months = []; for(let i=0;i<12;i++){ const d = new Date(); d.setMonth(d.getMonth()+i); months.push({ label: d.toLocaleString("es-MX",{month:"short",year:"2-digit"}) }); }
        const cap = (v.capex||0)/Math.max(v.durationMonths,1); const sal = (v.revenue||0)/Math.max(v.durationMonths,1);
        el.innerHTML = months.map(m=>`<div class="mf-month"><div class="mf-month__h">${m.label.toUpperCase()}</div><div class="mf-month__kpi">CAPEX: <strong>${fmtMoney(cap,p.currency)}</strong></div><div class="mf-month__kpi">Ventas: <strong>${fmtMoney(sal,p.currency)}</strong></div></div>`).join("");

        if(elList) elList.innerHTML = (p.reports&&p.reports.length) ? p.reports.slice().reverse().map(r=>`<div class="mf-item"><div class="mf-item__left"><div class="mf-item__title">Corte ${r.asOf}</div></div><div class="mf-item__right"><button class="mf-btn mf-btn--ghost">Ver</button></div></div>`).join("") : "<div class=\"mf-muted\">Sin reportes generados.</div>";

      function createVersion(){ const p = getProject(); const base = getVersion(p); const uw = getUW(p); if(!p||!base) return; const type = $("#newType").value; const stage = $("#newStage").value; const asOf = $("#newAsOf").value || new Date().toISOString().slice(0,10); const next = (p.versions.length+1); const id = type+"-"+String(next).padStart(2,"0"); const clone = { id, type, stage, asOf, status: "En revisión", vigente: false, irr: base.irr, bps_vs_uw: Math.round((base.irr-uw.irr)*10000), poc: base.poc, margin: base.margin, capex: base.capex, revenue: base.revenue, durationMonths: base.durationMonths, comments: $("#newComment").value || "", movements: [] }; p.versions.push(clone); mfState.versionId = id; closeModal(); showToast("Creada "+id); renderAll(); }

      $("#mfProject").innerHTML = PROJECTS.map(p=>`<option value="${p.id}">${p.name}</option>`).join(""); $("#mfProject").value = mfState.projectId;
      $("#mfStage").innerHTML = ["All",...MF_STAGES].map(s=>`<option value="${s}">${s}</option>`).join(""); $("#mfStage").value = mfState.stage;
      $("#mfProject").addEventListener("change", ()=>{ mfState.projectId = $("#mfProject").value; const pr = getProject(); mfState.versionId = pr && (pr.versions.find(v=>v.vigente)||pr.versions[pr.versions.length-1])?.id; renderAll(); });
      $("#mfStage").addEventListener("change", ()=>{ mfState.stage = $("#mfStage").value; renderAll(); });
      $("#mfVersion").addEventListener("change", ()=>{ mfState.versionId = $("#mfVersion").value; renderAll(); });

      $$(".mf-tab").forEach(t=>t.addEventListener("click", ()=>activateTab(t.dataset.tab)));
      $("#mfBtnGoTriggers")&&$("#mfBtnGoTriggers").addEventListener("click", ()=>activateTab("triggers"));
      $("#mfBtnOpenVersions")&&$("#mfBtnOpenVersions").addEventListener("click", ()=>activateTab("versions"));
      $("#mfBtnCreateVersion")&&$("#mfBtnCreateVersion").addEventListener("click", openModal);
      $("#mfBtnNewVersionHere")&&$("#mfBtnNewVersionHere").addEventListener("click", openModal);
      $("#mfBtnCreateFromTrigger")&&$("#mfBtnCreateFromTrigger").addEventListener("click", openModal);
      $("#mfBtnCloneDraft")&&$("#mfBtnCloneDraft").addEventListener("click", openModal);
      $("#mfModalClose")&&$("#mfModalClose").addEventListener("click", closeModal);
      $("#mfModalCancel")&&$("#mfModalCancel").addEventListener("click", closeModal);
      $("#mfModalCreate")&&$("#mfModalCreate").addEventListener("click", ()=>{ createVersion(); });
      modal&&modal.addEventListener("click", e=>{ if(e.target===modal) closeModal(); });
      $("#mfBtnExport")&&$("#mfBtnExport").addEventListener("click", ()=>{ const payload = { exportedAt: new Date().toISOString(), projectId: mfState.projectId, project: getProject() }; const a = document.createElement("a"); a.href = "data:application/json,"+encodeURIComponent(JSON.stringify(payload,null,2)); a.download = "mf_"+mfState.projectId+".json"; a.click(); showToast("Exportado JSON."); });
      $("#mfBtnMarkVigente")&&$("#mfBtnMarkVigente").addEventListener("click", ()=>{ const p = getProject(); if(!p) return; p.versions.forEach(v=>v.vigente=false); const v = getVersion(p); if(v){ v.vigente=true; v.status="Aprobado"; showToast(v.id+" marcado vigente."); } renderAll(); });
      $("#mfBtnAddMove")&&$("#mfBtnAddMove").addEventListener("click", ()=>{ const p = getProject(); const v = getVersion(p); if(!p||!v) return; const name = prompt("Nombre movimiento:","CAPEX +2%")||"Movimiento"; const bps = Number(prompt("Δ bps:","-10"))||0; v.movements = v.movements||[]; v.movements.push({ date: new Date().toISOString().slice(0,10), name, category: "Técnico", bps, comment: "" }); v.irr = (v.irr||0) + bps/10000; const uw = getUW(p); v.bps_vs_uw = Math.round((v.irr-uw.irr)*10000); showToast("Movimiento agregado."); renderAll(); });
      $("#mfBtnGenerateReport")&&$("#mfBtnGenerateReport").addEventListener("click", ()=>{ const p = getProject(); const v = getVersion(p); if(!p||!v) return; p.reports = p.reports||[]; const asOf = $("#mfReportAsOf").value || new Date().toISOString().slice(0,10); p.reports.push({ asOf, versionId: v.id, globalStatus: "OK", activeTriggers: 0 }); $("#mfReportOut").innerHTML = `<div class="mf-report__h">Reporte · ${p.name} · ${asOf}</div><div class="mf-report__p">Versión: ${v.id} · TIR: ${fmtPct(v.irr)}</div>`; showToast("Reporte generado."); renderReports(); });
      $("#mfReportAsOf")&&($("#mfReportAsOf").valueAsDate = new Date());
      $("#mfBtnResetInputs")&&$("#mfBtnResetInputs").addEventListener("click", ()=>{ ["inPricePct","inAbsorptionPct","inCapexPct","inOpexPct","inScheduleMonths","inRateBps"].forEach(id=>{ const el = $("#"+id); if(el) el.value = "0"; }); $("#mfSimOut").innerHTML = "<div class=\"mf-muted\">Ejecuta Simular impacto.</div>"; $("#mfSimStatus").textContent = "—"; showToast("Reset."); });
      $("#mfBtnSimulate")&&$("#mfBtnSimulate").addEventListener("click", ()=>{ const v = getVersion(getProject()); if(!v) return; const price = Number($("#inPricePct").value)||0, capex = Number($("#inCapexPct").value)||0; const deltaBps = Math.round(price*12 - capex*10); const newIrr = v.irr + deltaBps/10000; $("#mfSimStatus").textContent = Math.abs(deltaBps)>=50 ? "Material" : "No material"; $("#mfSimOut").innerHTML = `<div class="mf-simrow"><span>Impacto estimado</span><strong>${fmtBps(deltaBps)}</strong></div><div class="mf-simrow"><span>TIR simulada</span><strong>${fmtPct(newIrr)}</strong></div>`; showToast("Simulación ejecutada."); });
      $("#mfBtnSaveDraft")&&$("#mfBtnSaveDraft").addEventListener("click", ()=>showToast("Borrador guardado (demo)."));
      $("#mfBtnAddTrigger")&&$("#mfBtnAddTrigger").addEventListener("click", ()=>showToast("Agregar trigger (demo)."));
      if($("#mfTriggerSearch")) $("#mfTriggerSearch").addEventListener("input", renderTriggers);
      if($("#mfTriggerState")) $("#mfTriggerState").addEventListener("change", renderTriggers);

      renderAll();
    };

    /* =========================
       Expose functions used in HTML
       ========================= */
    window.setView = setView;
    window.openProject = openProject;

    /* =========================
       Initial render
       ========================= */
    render();
  </script>
</body>
</html>
